<h2 class="text-2xl font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-bolt mr-2 text-yellow-500"></i>Interactive Particle Simulation</h2>
<p class="text-slate-600 mb-4">Observe electron and ion flow in the Zn–Cu galvanic cell. Press <strong>Play</strong>, then try <strong>removing the salt bridge</strong> to discover what happens!</p>

<div class="bg-slate-100 p-4 rounded-xl border border-slate-200 mb-4 flex flex-wrap gap-3 items-center justify-between">
    <div class="flex flex-wrap gap-2">
        <button id="sim-play" onclick="toggleSimulation()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow font-semibold flex items-center gap-2">
            <i class="fa-solid fa-play"></i> Play
        </button>
        <button onclick="resetSimulation()" class="bg-slate-500 hover:bg-slate-600 text-white px-4 py-2 rounded shadow font-semibold flex items-center gap-2">
            <i class="fa-solid fa-rotate-right"></i> Reset
        </button>
        <button id="btn-salt-bridge" onclick="toggleSaltBridge()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded shadow font-semibold flex items-center gap-2">
            <i class="fa-solid fa-link-slash"></i> Remove Salt Bridge
        </button>
    </div>

    <div class="flex flex-wrap items-center gap-3 text-sm font-semibold">
        <span class="flex items-center gap-1 text-yellow-500"><i class="fa-solid fa-circle"></i> e⁻</span>
        <span class="flex items-center gap-1 text-purple-400"><i class="fa-solid fa-circle"></i> K⁺</span>
        <span class="flex items-center gap-1 text-green-400"><i class="fa-solid fa-circle"></i> NO₃⁻</span>
        <span class="flex items-center gap-1 text-red-400"><i class="fa-solid fa-circle"></i> Excess +</span>
        <span class="flex items-center gap-1 text-blue-400"><i class="fa-solid fa-circle"></i> Excess −</span>
    </div>
</div>

<!-- Canvas Container for 2D Simulation -->
<div id="sim-container">
    <canvas id="chemCanvas" width="800" height="450"></canvas>
</div>

<!-- Dynamic consequence explanation panel -->
<div id="consequence-panel" class="mt-4 p-4 rounded-xl border text-sm font-medium bg-slate-100 border-slate-200 text-slate-600">
    <i class="fa-solid fa-circle-info mr-2"></i>Press <strong>Play</strong> to start. Try removing the salt bridge while running to see what happens!
</div>
