<h2 class="text-2xl font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-jar mr-2 text-yellow-500"></i>Porous Pot Simulation</h2>
<p class="text-slate-600 mb-4">Observe electron and ion flow when utilizing a <strong>Porous Pot</strong>. It acts simultaneously as the container and the boundary, allowing ions to migrate to complete the circuit!</p>

<div class="bg-slate-100 p-4 rounded-xl border border-slate-200 mb-4 flex flex-wrap gap-3 items-center justify-between">
    <div class="flex flex-wrap gap-2">
        <button id="pp-sim-play" onclick="togglePPSimulation()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow font-semibold flex items-center gap-2">
            <i class="fa-solid fa-play"></i> Play
        </button>
        <button onclick="resetPPSimulation()" class="bg-slate-500 hover:bg-slate-600 text-white px-4 py-2 rounded shadow font-semibold flex items-center gap-2">
            <i class="fa-solid fa-rotate-right"></i> Reset
        </button>
    </div>

    <div class="flex flex-wrap items-center gap-3 text-sm font-semibold">
        <span class="flex items-center gap-1 text-yellow-500"><i class="fa-solid fa-circle"></i> e⁻</span>
        <span class="flex items-center gap-1 text-purple-400"><i class="fa-solid fa-circle"></i> Zn²⁺</span>
        <span class="flex items-center gap-1 text-green-400"><i class="fa-solid fa-circle"></i> SO₄²⁻</span>
    </div>
</div>

<!-- Canvas Container for 2D Simulation -->
<div id="pp-sim-container">
    <canvas id="ppChemCanvas" width="800" height="450"></canvas>
</div>

<!-- Dynamic consequence explanation panel -->
<div id="pp-consequence-panel" class="mt-4 p-4 rounded-xl border text-sm font-medium bg-slate-100 border-slate-200 text-slate-600">
    <i class="fa-solid fa-circle-info mr-2"></i>Press <strong>Play</strong> to start observing the Porous Pot mechanism!
</div>
